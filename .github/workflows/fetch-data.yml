name: Fetch IBKR Data & Deploy

on:
  push:
    branches: [master]
    # Any push to master redeploys — including on-demand data refreshes (a human
    # or PR merge committing fresh data/*.json). The workflow's OWN data commits
    # use GITHUB_TOKEN, and GITHUB_TOKEN-authored pushes never trigger workflows,
    # so the scheduled fetch can't set off a deploy loop.
  schedule:
    # Times are UTC and fixed; the ET equivalents below assume EDT (UTC-4, the
    # US summer offset). During EST (winter) each run lands one hour earlier ET.
    - cron: '30 13 * * 1-5'   # ~market open      — 09:30 ET
    - cron: '0 16 * * 1-5'    # midday            — 12:00 ET
    - cron: '0 18 * * 1-5'    # early afternoon   — 14:00 ET
    - cron: '55 19 * * 1-5'   # just before close — 15:55 ET
  workflow_dispatch: # Allow manual trigger from the Actions UI / dashboard button
    inputs:
      scope:
        description: 'full = IBKR + research price refresh · ibkr = IBKR/benchmarks only (skip micro)'
        type: choice
        options:
          - full
          - ibkr
        default: full
        required: false

# contents: commit the rolling P&L history · pages/id-token: deploy to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Never run two deploys at once; let an in-progress data commit finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance cryptography

      - name: Fetch data
        env:
          IBKR_CONSUMER_KEY: ${{ secrets.IBKR_CONSUMER_KEY }}
          IBKR_PRIVATE_KEY: ${{ secrets.IBKR_PRIVATE_KEY }}
          IBKR_ACCOUNT_ID: ${{ secrets.IBKR_ACCOUNT_ID }}
        run: python scripts/fetch.py

      # Refresh the Stock Picks tab's live price/score layer (yfinance, no MCP, no
      # secrets). The research layer in micro.json is untouched — it's rebuilt once
      # a day pre-market by a separate Claude routine. Non-fatal if yfinance hiccups.
      # Skipped on an IBKR-only dashboard refresh (scope=ibkr). For push/schedule
      # events inputs are empty, so `!= 'ibkr'` is true and this runs as before.
      - name: Refresh micro scores
        if: ${{ github.event.inputs.scope != 'ibkr' }}
        run: python scripts/micro_refresh.py || echo "micro_refresh skipped (non-fatal)"

      - name: Commit rolling P&L history
        run: |
          git config user.name "metallica-bot"
          git config user.email "bot@metallica-dashboard.local"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes this cycle."
          else
            git commit -m "data: update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - name: Assemble static site
        run: |
          rm -rf _site && mkdir -p _site
          cp index.html _site/
          cp -r data _site/
          touch _site/.nojekyll   # serve files verbatim, skip Jekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # auto-enables Pages (source = GitHub Actions) on first run

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
