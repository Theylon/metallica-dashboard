# IBKR book data (positions/account/pnl/benchmarks) is refreshed by the MCP
# pipeline (scripts/mcp_refresh.py, run from Claude sessions/Routines) and
# committed to master. This workflow refreshes the DERIVED layers (Yahoo
# cross-val, micro prices/scores, risk, signal scorecard), verifies the data,
# and deploys the static site to GitHub Pages.
name: Refresh Derived Data & Deploy

on:
  push:
    branches: [master]
    # Any push to master redeploys — including on-demand data refreshes (a human
    # or PR merge committing fresh data/*.json). The workflow's OWN data commits
    # use GITHUB_TOKEN, and GITHUB_TOKEN-authored pushes never trigger workflows,
    # so the scheduled fetch can't set off a deploy loop.
  schedule:
    # Times are UTC and fixed; the ET equivalents below assume EDT (UTC-4, the
    # US summer offset). During EST (winter) each run lands one hour earlier ET.
    - cron: '30 13 * * 1-5'   # ~market open      — 09:30 ET
    - cron: '0 16 * * 1-5'    # midday            — 12:00 ET
    - cron: '0 18 * * 1-5'    # early afternoon   — 14:00 ET
    - cron: '55 19 * * 1-5'   # just before close — 15:55 ET
  workflow_dispatch: # Allow manual trigger from the Actions UI
    inputs:
      scope:
        # value 'ibkr' kept for backward compatibility with old triggers;
        # it now just means "risk/deploy only, skip the micro price refresh"
        description: 'full = derived-data refresh · ibkr = risk/deploy only (skip micro)'
        type: choice
        options:
          - full
          - ibkr
        default: full
        required: false

# contents: commit the rolling P&L history · pages/id-token: deploy to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Never run two deploys at once; let an in-progress data commit finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      # Independent Yahoo Finance cross-validation pull for the Stock Picks cards
      # (yfinance, no secrets). Yahoo egress is reliable from CI but blocked in the
      # Claude research sessions, so the Action is the dependable home for this pull.
      # Once/day is plenty for a validation layer, so this runs only on the pre-close
      # cron plus push/manual full runs (not all 4 crons) to stay light on Yahoo.
      # Best-effort: a hiccup or rate-limit just leaves the last-good yahoo.json.
      - name: Yahoo cross-validation pull
        if: ${{ github.event.inputs.scope != 'ibkr' && (github.event_name != 'schedule' || github.event.schedule == '55 19 * * 1-5') }}
        run: python scripts/micro_yahoo.py || echo "micro_yahoo skipped (non-fatal)"

      # Refresh the Stock Picks tab's live price/score layer (yfinance, no MCP, no
      # secrets). The research layer in micro.json is untouched — it's rebuilt once
      # a day pre-market by a separate Claude routine. This step also recomputes the
      # Yahoo cross-check from the committed yahoo.json (no network). Non-fatal if
      # yfinance hiccups. Skipped on an IBKR-only dashboard refresh (scope=ibkr). For
      # push/schedule events inputs are empty, so `!= 'ibkr'` is true and this runs.
      - name: Refresh micro scores
        if: ${{ github.event.inputs.scope != 'ibkr' }}
        run: python scripts/micro_refresh.py || echo "micro_refresh skipped (non-fatal)"

      # Auto-compute the live risk engine (vol/beta/VaR/HHI always; correlation matrix +
      # per-name risk contribution when price_history.json exists). Pure Python, stdlib
      # only, reads the freshly-written data/*.json. Runs on every refresh (incl. ibkr
      # scope) since the core metrics use pnl/positions/benchmarks. Non-fatal.
      - name: Compute risk metrics
        run: python scripts/risk.py || echo "risk skipped (non-fatal)"

      # Signal-efficacy scorecard (rank-IC/IR of each micro sub-score vs forward returns)
      # + portfolio factor tilt. No-ops cheaply until micro_history.jsonl has enough days.
      - name: Compute signal scorecard
        if: ${{ github.event.inputs.scope != 'ibkr' }}
        run: python scripts/signal_ic.py || echo "signal_ic skipped (non-fatal)"

      # Process layer (see PROCESS.md): normalize committed FMP positioning dumps
      # (no-op until the positioning Routine commits them), score every data
      # channel against what it predicts (80% trust gate), backfill decision-log
      # outcomes, and rebuild the process-rule alerts. All offline from committed
      # data/, all non-fatal.
      - name: Normalize positioning (insiders + politicians)
        run: python scripts/positioning_build.py || echo "positioning skipped (non-fatal)"

      - name: Channel accuracy engine
        if: ${{ github.event.inputs.scope != 'ibkr' }}
        run: python scripts/channel_accuracy.py || echo "channel_accuracy skipped (non-fatal)"

      - name: Decision-log outcomes + process alerts
        run: |
          python scripts/decision_log.py --update-outcomes || echo "outcomes skipped (non-fatal)"
          python scripts/alerts_build.py || echo "alerts skipped (non-fatal)"

      # Freeze every live data point (analysts, sentiment, fundamentals, scores,
      # positioning, nowcasts, ...) into history/daily/<date>.json.gz for later
      # analysis. Rewrites today's file each run -> converges to EOD state.
      - name: Record daily data snapshot
        run: python scripts/daily_snapshot.py || echo "daily snapshot skipped (non-fatal)"

      # Data-contract / schema gate (same one standards.yml runs on PRs). The bot
      # commits data straight to master, bypassing the PR gate, so run it here too
      # or a schema break (e.g. a data file blanked, micro.json losing
      # `recommendations`) would deploy. DELIBERATELY fatal.
      - name: Validate data contract
        run: python scripts/validate_data.py

      # Cross-file reconciliation gate: account vs positions identities, pnl
      # schema, benchmark set, micro book vs live book, freshness. DELIBERATELY
      # fatal — broken data must fail the run rather than deploy.
      - name: Verify data consistency
        run: python scripts/verify_data.py

      - name: Commit rolling P&L history
        run: |
          git config user.name "metallica-bot"
          git config user.email "bot@metallica-dashboard.local"
          git add data/ history/
          if git diff --staged --quiet; then
            echo "No data changes this cycle."
          else
            git commit -m "data: update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - name: Assemble static site
        run: |
          rm -rf _site && mkdir -p _site
          cp index.html _site/
          cp -r data _site/
          touch _site/.nojekyll   # serve files verbatim, skip Jekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # auto-enables Pages (source = GitHub Actions) on first run

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
